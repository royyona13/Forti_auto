system_global:
    alias: "FortiGate-81F"
    gui-auto-upgrade-setup-warning: disable
    gui-certificates: enable
    hostname: "F81F-CB44"
    sslvpn-web-mode: enable
    switch-controller: enable
    timezone: "Europe/Jerusalem"
    virtual-switch-vlan: enable

system_accprofile:
    - prof_admin:
        secfabgrp: read-write
        ftviewgrp: read-write
        authgrp: read-write
        sysgrp: read-write
        netgrp: read-write
        loggrp: read-write
        fwgrp: read-write
        vpngrp: read-write
        utmgrp: read-write
        wanoptgrp: read-write
        wifi: read-write
        cli-get: enable
        cli-show: enable
        cli-exec: enable
        cli-config: enable



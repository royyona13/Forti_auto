        fields:
            - 1:
                name: "status"
                value: "DOWN"



    - HA Failover:
        description: "Default automation trigger configuration for when an HA failover occurs."
        event-type: ha-failover

    - Reboot:
        description: "Default automation trigger configuration for when a FortiGate is rebooted."
        event-type: reboot

    - FortiAnalyzer Connection Down:
        description: "Default automation trigger configuration for when the FortiAnalyzer connection is lost."
        event-type: event-log
        logid: 22902

    - License Expired Notification:
        description: "Default automation trigger configuration for when a license is near expiration."
        event-type: license-near-expiry
        license-type: any

    - Compromised Host - High:
        description: "Default automation trigger configuration for when a high severity compromised host is detected."

    - Incoming Webhook Call:
        description: "Default automation trigger configuration for an incoming webhook."
        event-type: incoming-webhook

    - Security Rating Notification:
        description: "Default automation trigger configuration for when a new Security Rating report is available."
        event-type: security-rating-summary
        report-type: any

    - Compromised Host:
        description: "An incident of compromise has been detected on a host endpoint."

    - Any Security Rating Notification:
        description: "A security rating summary report has been generated."
        event-type: security-rating-summary

    - AV & IPS DB update:
        description: "The antivirus and IPS database has been updated."
        event-type: virus-ips-db-updated

    - Configuration Change:
        description: "An administrator\'s session that changed a FortiGate\'s configuration has ended."
        event-type: config-change

    - Conserve Mode:
        description: "A FortiGate has entered conserve mode due to low memory."
        event-type: low-memory

    - High CPU:
        description: "A FortiGate has high CPU usage."
        event-type: high-cpu

    - License Expiry:
        description: "A FortiGate license is near expiration."
        event-type: license-near-expiry
        license-type: any

    - Anomaly Logs:
        description: "An anomalous event has occurred."
        event-type: anomaly-logs

    - IPS Logs:
        description: "An IPS event has occurred."
        event-type: ips-logs

    - SSH Logs:
        description: "A SSH event has occurred."
        event-type: ssh-logs

    - Traffic Violation:
        description: "A traffic policy has been violated."
        event-type: traffic-violation

    - Virus Logs:
        description: "A virus event has occurred."
        event-type: virus-logs

    - Webfilter Violation:
        description: "A webfilter policy has been violated."

report_layout:
    - default:
        title: "FortiGate System Analysis Report"
        style-theme: "default-report"
        options: [include-table-of-content, view-chart-as-heading]
        page:
            paper: letter
            page-break-before: heading1
            header:
                header-item:
                    - 1:
                        type: image
                        style: "header-image"
                        img-src: "fortinet_logo_small.png"



            footer:
                footer-item:
                    - 1:
                        style: "footer-text"
                        content: "FortiGate ${schedule_type} Security Report - Host Name: ${hostname}"

                    - 2:
                        style: "footer-pageno"




        body-item:
            - 101:
                type: image
                style: "report-cover1"
                img-src: "fortigate_log.png"

            - 103:
                style: "report-cover2"
                content: "FortiGate ${schedule_type} Security Report"

            - 105:
                style: "report-cover3"
                content: "Report Date: ${started_time}"


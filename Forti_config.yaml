    - _default:
        vdom: "root"
        alias: "_default.fortilink"
        snmp-index: 17
        switch-controller-feature: default-vlan
        interface: "fortilink"
        vlanid: 1

    - quarantine:
        vdom: "root"
        ip: [10.255.11.1, 255.255.255.0]
        description: "Quarantine VLAN"
        alias: "quarantine.fortilink"
        security-mode: captive-portal
        replacemsg-override-group: "auth-intf-quarantine"
        device-identification: enable
        snmp-index: 18
        switch-controller-access-vlan: enable
        switch-controller-feature: quarantine
        color: 6
        interface: "fortilink"
        vlanid: 4093

    - voice:
